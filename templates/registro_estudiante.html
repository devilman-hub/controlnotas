<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <a href="/registro_estudiante">Registrar Estudiante</a>
</head>
<body>

    <button onclick="window.location.href='/dashprincipal'">
        DashBoard
    </button>

    <h1>Registro Estudiante</h1>

    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    <form action="/registro_estudiante" method="POST">
        <div class="caja_input">
            <label for="username">Nombre</label>
            <input type="text" name="username" id="username" required>
        </div>

        <div class="caja_input">
            <label for="edad">Edad</label>
            <input type="number" name="edad" id="edad" required>
        </div>


        <div class="caja_input">
            <label for="nombre">Carrera</label>
            <select name="carrera" id="carrera" required>
                <option value="Fisica">Física</option>
            </select>
        </div>

        <div class="caja_input">
            <label for="nota1">Nota 1</label>
            <input type="number" name="nota1" id="nota1" step="0.1" min="0" max="5" required>
        </div>

        <div class="caja_input">
            <label for="nota2">Nota 2</label>
            <input type="number" name="nota2" id="nota2" step="0.1" min="0" max="5" required>
        </div>

        <div class="caja_input">
            <label for="nota3">Nota 3</label>
            <input type="number" name="nota3" id="nota3" step="0.1" min="0" max="5" required>
        </div>

        <button type="submit">Registrar</button>
    </form>

</body>

<style>
    body{
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        align-content: center;
    }
    form{
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 20px;
        border-radius: 20px;
        border: solid 1px black;
        box-shadow: black 0px 2px 5px;
    }
    .caja_input{
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 10px;
    }
    button{
        background-color: black;
        color: white;
        padding: 10px;
        font-size: 20px;
        border-radius: 10px;
        cursor: pointer;
    }
</style>
    
</body>
<script>
    document.addEventListener("DOMContentLoaded", async () => {
        const res = await fetch('/obtener_carreras');
        const datos = await res.json();

        const carrera = document.getElementById("carrera");
        
        // Limpiar opciones previas
        carrera.innerHTML = "";

        datos.forEach(item => {
            const option = document.createElement("option");
            option.value = item.carrera;
            option.textContent = item.carrera;
            carrera.appendChild(option);
        });
    });
</script>
</html>
