<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro Estudiante</title>
</head>
<body>
<h2>Registro Estudiante</h2>
<form method="POST">
    Nombre: <input type="text" name="nombre" required><br><br>
    Edad: <input type="number" name="edad" required><br><br>
    Carrera: <input type="text" name="carrera" required><br><br>
    Nota #1: <input type="number" step="0.1" name="nota1" required><br><br>
    Nota #2: <input type="number" step="0.1" name="nota2" required><br><br>
    Nota #3: <input type="number" step="0.1" name="nota3" required><br><br>
    <button type="submit">Registrar</button>
</form>
</body>
</html>
