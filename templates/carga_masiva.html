<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carga Masiva de Estudiantes</title>

</head>

<body>


<h1>Carga Masiva de Estudiantes</h1>

<!-- FORMULARIO -->
<form action="/carga_masiva" method="POST" enctype="multipart/form-data">
    <div class="contenedor">
        
        <label>Seleccionar Archivo Excel</label><br>
        <input type="file" name="archivo" id="archivo" required>
        <br>
        <button type="submit">Subir Archivo</button>
    </div>

</form>


{% if resumen %}
    <table border="1">
        <thead>
            <tr>
                <th>Resultado</th>
                <th>Cantidad</th>
            </tr>
        </thead>
        <tbody>
            {% for fila in resumen %}
            <tr>
                <td>{{ fila.categoria }}</td>
                <td>{{ fila.cantidad }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% endif %}

    {% if hay_rechazados %}
        <a href="/descargar_rechazados">⬇️ Descargar registros rechazados</a>
    {% endif %}

</body>


<style>

    body{
        font-family: Arial, Helvetica, sans-serif;
        background:#f4f4f4;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .contenedor{
        background:white;
        padding:40px;
        border-radius:10px;
        width:400px;
        box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        text-align:center;
    }

    h1{
        margin-bottom:20px;
    }

    input[type=file]{
        margin-top:10px;
        margin-bottom:20px;
    }

    button{
        background:#2c7be5;
        color:white;
        border:none;
        padding:10px 20px;
        border-radius:5px;
        cursor:pointer;
    }

    button:hover{
        background:#1a5bb8;
    }

    .mensaje{
        background:#d4edda;
        padding:10px;
        margin-bottom:15px;
        border-radius:5px;
        color:#155724;
    }
</style>


</html>
